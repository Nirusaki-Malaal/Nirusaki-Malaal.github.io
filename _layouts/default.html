<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
{% include head.html %}
</head>
<body class="font-body antialiased selection:bg-neon-pink selection:text-white {% if page.layout == 'post' or page.url contains '/blogs/' %}blog-page-bg{% endif %}">
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    {% include cursor.html %}
    {% include nav.html %}
    {% include sidebar.html %}

    <main id="main-content" role="main">
        {{ content }}
    </main>

    {% unless page.url contains '/blogs/' %}
    {% include footer.html %}
    {% endunless %}

    <script>window.siteBaseUrl = "{{ site.baseurl | default: '' }}";</script>
    <script src="{{ '/assets/js/script.js' | relative_url }}" defer></script>
</body>
</html>
