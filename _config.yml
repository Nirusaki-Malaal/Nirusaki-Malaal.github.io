title: Nirusaki Portfolio
description: "Nirusaki Portfolio showcases Nirusaki's Python, automation, and open-source projects including Telegram bots, web tools, and Linux utilities."
url: "https://nirusaki.me"
baseurl: ""
author: Nirusaki
email: nirusakimalaal@gmail.com
github_username: Nirusaki-Malaal

permalink: /blogs/:year/:month/:day/:title/

timezone: Asia/Kolkata


plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Comments configuration (Cusdis)
cusdis:
  app_id: "c53ce524-edf0-4e1f-9621-05ef5181a8e0"
  theme: "dark"




