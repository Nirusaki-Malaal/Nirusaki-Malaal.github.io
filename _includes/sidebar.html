<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 z-[55] transform -translate-x-full transition-transform duration-300">
    <div class="h-full bg-deep-black/95 backdrop-blur-xl border-r border-white/10 pt-14 pb-28 px-4 overflow-y-auto relative">
        <!-- Close Button -->
        <button id="sidebar-close" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors" aria-label="Close sidebar">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <!-- Navigation -->
        <div class="mb-6">
            <details class="group" {% unless page.layout == 'post' %}open{% endunless %}>
                <summary class="text-sm font-bold text-gray-400 uppercase tracking-widest px-3 mb-3 cursor-pointer flex items-center justify-between hover:text-white select-none list-none [&::-webkit-details-marker]:hidden">
                    <span>Navigation</span>
                    <span class="transition-transform duration-300 group-open:rotate-180 text-gray-500 hover:text-white">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </span>
                </summary>
                <nav class="space-y-1">
                    <a href="{{ '/' | relative_url }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
                        <span>Home</span>
                    </a>
                    <a href="{{ '/#about' | relative_url }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        <span>About</span>
                    </a>
                    <a href="{{ '/#arsenal' | relative_url }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                        <span>Arsenal</span>
                    </a>
                    <a href="{{ '/#hall-of-fame' | relative_url }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
                        <span>Hall of Fame</span>
                    </a>
                    <a href="{{ '/#freelance' | relative_url }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <span>Freelance</span>
                    </a>
                    <a href="{{ '/#projects' | relative_url }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                        <span>Projects</span>
                    </a>
                </nav>
            </details>
        </div>

        <!-- Divider -->
        <div class="h-px bg-white/10 mx-3 my-4"></div>

        <!-- Content -->
        <div class="mb-6">
            <div class="text-sm font-bold text-gray-400 uppercase tracking-widest px-3 mb-3">Content</div>
            <nav class="space-y-1">
                <a href="{{ '/blogs/' | relative_url }}" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:text-white hover:bg-white/5 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
                    <span>Blogs</span>
                </a>
            </nav>
        </div>

        <!-- Dynamic Blog Table of Contents -->
        <div id="sidebar-toc-container" class="mb-6 hidden px-2">
            <div class="h-px bg-white/10 mx-1 my-4"></div>
            <div class="glass-panel p-4 rounded-xl">
                <div class="text-sm font-bold text-white uppercase tracking-widest mb-4 flex items-center gap-2">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
                    <span>On This Page</span>
                </div>
                <nav id="sidebar-toc" class="space-y-1.5"></nav>
            </div>
        </div>

        <!-- Bottom Profile -->
        <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-white/10">
            <div class="flex items-center gap-3">
                <img src="https://avatars.githubusercontent.com/u/213580728?v=4&s=32" alt="Nirusaki" class="w-8 h-8 rounded-full border border-white/20" loading="lazy">
                <div>
                    <div class="text-sm font-bold text-white">Nirusaki</div>
                    <div class="text-xs text-gray-500 font-jp">ニルサキ</div>
                </div>
            </div>
        </div>
    </div>
</aside>

<!-- Sidebar Overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-[54] hidden"></div>
