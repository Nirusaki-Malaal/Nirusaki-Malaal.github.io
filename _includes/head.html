<!-- Character & Viewport -->
<meta name="google-site-verification" content="C00OA3PoEnRfihFR8FypLbQd29gd80sqcdBfs7FlpzA" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- Primary SEO -->
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="keywords" content="{{ page.keywords | default: 'Nirusaki, nirusaki portfolio, ニルサキ, Python developer portfolio, automation engineer, Telegram bot developer, Arch Linux, Flask developer, MongoDB, web scraping, video encoder, GitHub portfolio, C++ developer, JavaScript developer, Pyrogram, Ubuntu server, open source contributor' }}">
<meta name="author" content="{{ site.author }}">
<meta name="robots" content="index, follow, max-image-preview:large">
<meta name="theme-color" content="#050505">
<link rel="canonical" href="{{ page.url | absolute_url }}">
{% feed_meta %}

<!-- Open Graph -->
<meta property="og:type" content="{{ page.og_type | default: 'website' }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ page.image | default: 'https://avatars.githubusercontent.com/u/213580728?v=4&s=1200' }}">
<meta property="og:site_name" content="{{ site.title }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@nirusaki">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ page.image | default: 'https://avatars.githubusercontent.com/u/213580728?v=4&s=1200' }}">

<!-- Preconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://avatars.githubusercontent.com">

<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="https://avatars.githubusercontent.com/u/213580728?v=4&s=180">
<link rel="icon" type="image/png" sizes="32x32" href="https://avatars.githubusercontent.com/u/213580728?v=4&s=32">
<link rel="icon" type="image/png" sizes="16x16" href="https://avatars.githubusercontent.com/u/213580728?v=4&s=16">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<!-- Tailwind Config -->
<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    'display': ['Syncopate', 'sans-serif'],
                    'body': ['Rajdhani', 'sans-serif'],
                    'jp': ['Noto Sans JP', 'sans-serif'],
                },
                colors: {
                    'neon-pink': '#ff006e',
                    'neon-cyan': '#00f5ff',
                    'neon-purple': '#b026ff',
                    'deep-black': '#050505',
                    'arch-blue': '#1793d1',
                    'ubuntu-orange': '#e95420',
                }
            }
        }
    }
</script>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- Devicon Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">

{% if page.extra_head %}{{ page.extra_head }}{% endif %}
